blueprint:
  name: Universal Room Mode Engine
  description: |
      ROOM MODE ENGINE
    
      PURPOSE
      -------
      Resolves the active mode for a room based on house state, room intent, time phase,
      and manual override. Delegates execution to a single mode handler script, allowing any behavior
      (lighting, blinds, audio, notifications, etc.) to be defined per room.
    
      PRIORITY
      --------
        1. Manual Override → Do nothing (automation yields control)
        2. House State ≠ Home → mode = off
           • For bedrooms, “Sleeping” → mode = sleeping
        3. Room Intent ≠ Auto → mode = intent
        4. Otherwise → mode = time_phase
    
      SETUP
      -----
      1. Create input helpers:
         • input_boolean: Manual Override
         • input_select: Room Intent (Auto, Relax, Movie, Bright)
         • input_select: House State (Home, Away, Vacation, Sleeping, etc.)
         • input_select: Time Phase (Morning, Day, Evening, Night)
    
      2. Create ONE mode handler script for this room:
         • This script must accept a variable: `mode`
         • Example: script.living_mode_handler
    
      3. Configure the blueprint:
         • Enter the room key (lowercase, no spaces)
         • Specify if room is a bedroom (affects behavior in Sleeping mode)
         • Specify if room intent resets at sunrise
         • Link the mode handler script
         • Link the input helpers we created earlier for this room
    
      NOTES
      -----
      • The mode handler script receives `mode` (lowercase) as a param
      • Script handles ALL execution logic
      • Manual override prevents any script execution

  domain: automation
  input:
    mode_handler:
      name: Mode Handler Script
      description: Script that applies the resolved mode
      selector:
        entity:
          domain: script

    is_bedroom:
      name: Room is a bedroom
      description: Enable if this room is a bedroom. Affects behavior in Sleeping mode
      default: false
      selector:
        boolean: {}
    
    reset_at_sunrise:
      name: Room intent resets at sunrise
      description: Enable if the room intent should reset at sunrise
      default: false
      selector:
        boolean: {}

    room_intent:
      name: Room Intent Selector
      selector:
        entity:
          domain: input_select

    house_state:
      name: House State Selector
      selector:
        entity:
          domain: input_select

    time_phase:
      name: Time Phase Selector
      selector:
        entity:
          domain: input_select

    manual_override:
      name: Manual Override Boolean
      selector:
        entity:
          domain: input_boolean
triggers:
  - trigger: state
    entity_id: !input room_intent

  - trigger: state
    entity_id: !input house_state

  - trigger: state
    entity_id: !input time_phase

  - trigger: state
    entity_id: !input manual_override

mode: restart

action:
  - variables:
      is_bedroom: !input is_bedroom
      reset_at_sunrise: !input reset_at_sunrise
      target_script: !input mode_handler
      
      room_int: !input room_intent
      intent: "{{ states(room_int) }}"
      
      house_md: !input house_state
      house: "{{ states(house_md) }}"
      
      time_ph: !input time_phase
      phase: "{{ states(time_ph) }}"
      
      manual_ovr: !input manual_override
      manual: "{{ is_state(manual_ovr, on) }}"
      
      # Reset intent logically at sunrise/morning phase
      effective_intent: >
        {% if reset_at_sunrise and phase | lower == 'morning' %}
          Auto
        {% else %}
          {{ intent }}
        {% endif %}

      resolved_mode: >
        {% if manual %}
          manual
        {% elif house != 'Home' %}
          {% if is_bedroom and house == 'Sleeping' %}
            sleeping
          {% else %}
            off
          {% endif %}
        {% elif effective_intent != 'Auto' %}
          {{ effective_intent | lower }}
        {% else %}
          {{ phase | lower }}
        {% endif %}

  - choose:
      # 🔴 Manual override → do nothing
      - conditions:
          - condition: template
            value_template: "{{ manual }}"
        sequence: []

      # 🟢 Normal execution
      - conditions:
          - condition: template
            value_template: "{{ not manual }}"
        sequence:
          - service: script.turn_on
            target:
              entity_id: "{{ target_script }}"
            data:
              variables:
                mode: "{{ resolved_mode }}"
