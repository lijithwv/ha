backyard_floodlight_control:
  alias: "Backyard Floodlight Control"
  description: "Turn the backyard floodlight on or off"
  fields:
    state:
      description: "Desired state: 'on' or 'off'"
      example: "on"
  sequence:
    - if:
        - condition: template
          value_template: "{{ states('light.backyard_floodlight') != state }}"
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ state == 'on' }}"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.backyard_floodlight
            - conditions:
                - condition: template
                  value_template: "{{ state == 'off' }}"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id: light.backyard_floodlight
