backyard_floodlight_control:
  alias: "Backyard Floodlight Control"
  description: "Turn the backyard floodlight on or off"
  fields:
    state:
      description: "Desired state: 'on' or 'off'"
      example: "on"
  sequence:
    - if:
        - condition: template
          value_template: "{{ states('light.backyard_floodlight') != state }}"
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ state == 'on' }}"
              sequence:
                - type: turn_on
                  device_id: e58b62ad3d2b0852fbb8c3b65dd5d75b
                  entity_id: 33efe388716a0405121ef6b8c89acd08
                  domain: light
            - conditions:
                - condition: template
                  value_template: "{{ state == 'off' }}"
              sequence:
                - type: turn_off
                  device_id: e58b62ad3d2b0852fbb8c3b65dd5d75b
                  entity_id: 33efe388716a0405121ef6b8c89acd08
                  domain: light