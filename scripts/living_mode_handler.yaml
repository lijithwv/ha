living_mode_handler:
  alias: Living Mode Handler
  description: ''
  fields:
    mode:
      description: Mode to be handled
      example: Auto, Away etc
  sequence:
  - choose:
    # Morning
    - conditions:
      - condition: template
        value_template: "{{ mode | lower == 'morning' }}"
      sequence:
        - parallel:
          - action: script.living_corner_lamp_control
            data:
              state: 'off'
          - action: script.living_table_lamp_control
            data:
              state: 'off'
          - action: script.living_tv_control
            data:
              state: 'off'
                
    # Evening
    - conditions:
      - condition: template
        value_template: "{{ mode | lower == 'evening' }}"
      sequence:
        - parallel:
          - action: script.living_table_lamp_control
            data:
              state: 'on'
              brightness: 30
          - action: script.living_corner_lamp_control
            data:
              state: 'on'
              brightness: 100
          - action: script.living_tv_control
            data:
              state: 'on'

    # Midnight
    - conditions:
      - condition: template
        value_template: "{{ mode | lower == 'midnight' }}"
      sequence:
        - parallel:
          - action: script.living_corner_lamp_control
            data:
              state: 'on'
              brightness: 10
          - action: script.living_table_lamp_control
            data:
              state: 'off'
          - action: script.living_tv_control
            data:
              state: 'off'

    # Movie
    - conditions:
      - condition: template
        value_template: "{{ mode | lower == 'movie' }}"
      sequence:
        - parallel:
          - action: script.living_table_lamp_control
            data:
              state: 'on'
              brightness: 30
              preset: movie
          - action: script.living_corner_lamp_control
            data:
              state: 'on'
              brightness: 100
              preset: movie
          - action: script.living_tv_control
            data:
              state: 'on'

    # Away
    - conditions:
      - condition: template
        value_template: "{{ mode | lower == 'away' }}"
      sequence:
        - action: light.turn_off
          target:
            area_id: living_room
        - action: script.living_tv_control
          data:
            state: 'off'
