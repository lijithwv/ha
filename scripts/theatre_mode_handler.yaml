theatre_mode_handler:
  alias: Theatre Mode Handler
  description: ''
  fields:
    mode:
      description: Mode to be handled
      example: Auto, Away etc
  sequence:
  - choose:           
    # Active / On
    - conditions:
      - condition: template
        value_template: "{{ mode | lower in ['evening', 'movie', 'game']}}"
      sequence:
        - parallel:
          - action: script.theatre_sunset_light_control
            data:
              state: 'on'
   
    # Off by default
    default:
      - action: script.theatre_sunset_light_control
        data:
          state: 'off'
