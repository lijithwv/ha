porch_light_control:
  alias: "Porch Light Control"
  description: "Turn the porch light on or off, with optional brightness"
  fields:
    state:
      description: "Desired state: 'on' or 'off'"
      example: "on"
    brightness:
      description: "Brightness percentage when turning on (1-100)"
      example: 50
      required: false
  sequence:
    - if:
        - condition: template
          value_template: "{{ states('light.porch_light') != state }}"
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ state == 'on' }}"
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: light.porch_light
                  data:
                    brightness_pct: "{{ brightness | default(100) }}"
                    color_temp_kelvin: 2000
            - conditions:
                - condition: template
                  value_template: "{{ state == 'off' }}"
              sequence:
                - service: light.turn_off
                  target:
                    entity_id: light.porch_light