- id: '1755514817754'
  alias: Living Lights Engine
  description: ''
  triggers:
  # Sunrise
  - trigger: sun
    event: sunrise
    id: sunrise

  # Morning - 1 hour before Sunrise
  - trigger: sun
    event: sunrise
    id: morning
    offset: 01:00:00

  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''sunrise'' }}'
      sequence:
      - parallel:
          - action: script.turn_on
            target:
              entity_id: script.living_corner_lamp_control
            data:
              state: 'on'
          - action: script.turn_on
            target:
              entity_id: script.living_table_lamp_control
            data:
              state: 'on'
        enabled: true
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''morning'' }}'
      sequence:
      - parallel:
          - action: script.turn_off
            target:
              entity_id: script.living_corner_lamp_control
            data:
              state: 'off'
          - action: script.turn_off
            target:
              entity_id: script.living_table_lamp_control
            data:
              state: 'off'
        enabled: true
  mode: single