- id: '1755770561310'
  alias: Theatre Light Schedule
  description: ''
  triggers:
  - trigger: sun
    event: sunset
    id: 'on'
    offset: -00:30:00
  - trigger: time
    at: '23:59:00'
    id: 'off'
  - trigger: sun
    event: sunrise
    offset: -01:00:00
    id: sunrise
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''on'' }}'
      sequence:
      - action: script.theatre_sunset_light_on
        metadata: {}
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''off'' }}'
      - condition: state
        entity_id: media_player.theatre_tv
        state:
        - 'off'
        - unavailable
        - unknown
      sequence:
      - action: script.theatre_sunset_light_off
        metadata: {}
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''sunrise'' }}'
      sequence:
      - action: script.theatre_sunset_light_off
        metadata: {}
        data: {}
  mode: single